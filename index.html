<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>採購單管理系統</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-storage-compat.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // 整合了你專屬的 Firebase 設定碼
        const firebaseConfig = {
            apiKey: "AIzaSyB9VcueWD3AdLENr5Jdp0__pRVCYtJ95no",
            authDomain: "pms-kingtex.firebaseapp.com",
            projectId: "pms-kingtex",
            storageBucket: "pms-kingtex.firebasestorage.app",
            messagingSenderId: "950519740298",
            appId: "1:950519740298:web:19e78a0fb18f6788083a73",
            measurementId: "G-Y9DL3C4X2E"
        };

        // 初始化 Firebase (防止重複初始化)
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();
        const storage = firebase.storage();

        function App() {
            // 動態取得當前電腦的本地日期
            const d = new Date();
            const todayStr = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
            const todayDate = new Date(todayStr);

            const [firebaseUser, setFirebaseUser] = useState(null);
            const [isLoading, setIsLoading] = useState(true);
            const [isOnline, setIsOnline] = useState(navigator.onLine ?? true);
            
            const [orders, setOrders] = useState([]);
            const [prices, setPrices] = useState([]); 
            
            const [currentView, setCurrentView] = useState('PO_LIST'); 
            
            const [showAddForm, setShowAddForm] = useState(false);
            const [expandedOrderId, setExpandedOrderId] = useState(null);
            
            const [activeFilter, setActiveFilter] = useState('ALL'); 
            const [searchQuery, setSearchQuery] = useState('');
            const [dateRange, setDateRange] = useState({ start: '', end: '' });
            const [sortOrder, setSortOrder] = useState('desc'); 
            
            const [previewPdfUrl, setPreviewPdfUrl] = useState(null);
            const [editingItems, setEditingItems] = useState({ orderId: null, items: [] });
            
            const [isCustomVendor, setIsCustomVendor] = useState(false);
            
            // 新增：防呆與儲存狀態提示
            const [isSubmitting, setIsSubmitting] = useState(false);

            // 權限管理
            const [currentUser, setCurrentUser] = useState(null);
            const isAdmin = currentUser === 'Ryan';
            const [showLoginModal, setShowLoginModal] = useState(false);
            const [loginForm, setLoginForm] = useState({ username: '', password: '' });
            const [loginError, setLoginError] = useState('');

            // 單價管理狀態
            const [priceModal, setPriceModal] = useState({ isOpen: false, id: null, model: '', price: '', priceUsd: '', reason: '' });
            const [historyModal, setHistoryModal] = useState({ isOpen: false, model: '', history: [] });

            // 新增表單
            const initialFormState = {
                displayId: '', vendor: '', orderDate: todayStr, deliveryDate: '',
                items: [{ model: '', vendorModel: '', quantity: 1, unitPrice: '', unitPriceUsd: '', remark: '' }], pdfUrl: null, pdfFile: null
            };
            const [formData, setFormData] = useState(initialFormState);
            const [completeData, setCompleteData] = useState({ date: todayStr, remark: '' });

            useEffect(() => {
                const handleOnline = () => setIsOnline(true);
                const handleOffline = () => setIsOnline(false);
                window.addEventListener('online', handleOnline);
                window.addEventListener('offline', handleOffline);
                return () => {
                    window.removeEventListener('online', handleOnline);
                    window.removeEventListener('offline', handleOffline);
                };
            }, []);

            useEffect(() => {
                auth.signInAnonymously().catch(err => console.error("登入失敗", err));
                const unsubscribe = auth.onAuthStateChanged(user => setFirebaseUser(user));
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!firebaseUser) return;
                
                const unsubOrders = db.collection('po_orders').onSnapshot(snapshot => {
                    setOrders(snapshot.docs.map(doc => ({ dbId: doc.id, ...doc.data() })));
                    setIsLoading(false);
                }, err => {
                    console.error("讀取訂單失敗:", err);
                    setIsLoading(false);
                });

                const unsubPrices = db.collection('po_prices').onSnapshot(snapshot => {
                    setPrices(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                }, err => console.error("讀取單價失敗:", err));

                return () => { unsubOrders(); unsubPrices(); };
            }, [firebaseUser]);

            const handleLogin = (e) => {
                e.preventDefault();
                if (loginForm.username === 'Ryan' && loginForm.password === 'admin315') {
                    setCurrentUser('Ryan');
                    setShowLoginModal(false);
                    setLoginForm({ username: '', password: '' });
                    setLoginError('');
                } else {
                    setLoginError('帳號或密碼錯誤，請重新輸入');
                }
            };

            const handleLogout = () => {
                setCurrentUser(null);
                setCurrentView('PO_LIST'); 
            };

            const getAlertInfo = (dateStr, status) => {
                if (status === '已收貨') return { text: '無', color: 'text-gray-500', bg: 'bg-gray-100' };
                if (!dateStr) return { text: '未定', color: 'text-gray-500', bg: 'bg-gray-100' };
                const targetDate = new Date(dateStr);
                const diffTime = targetDate - todayDate;
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                if (diffDays < 0) return { text: '● 已逾期', color: 'text-red-700', bg: 'bg-red-100' };
                if (diffDays <= 3) return { text: '● 即將到期', color: 'text-orange-700', bg: 'bg-orange-100' };
                return { text: '正常', color: 'text-green-700', bg: 'bg-green-100' };
            };

            const formatRMB = (amount) => new Intl.NumberFormat('zh-CN', { style: 'currency', currency: 'CNY', maximumFractionDigits: 2 }).format(amount || 0);
            const formatUSD = (amount) => amount ? new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 2 }).format(amount) : '-';

            const calculateFormTotal = () => {
                return formData.items.reduce((sum, item) => {
                    const price = Number(item.unitPrice) || 0;
                    const qty = parseInt(item.quantity) || 0;
                    return sum + (price * qty);
                }, 0);
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (file && file.type === 'application/pdf') {
                    if (file.size > 5 * 1024 * 1024) {
                        alert("檔案太大囉！請上傳 5MB 以下的 PDF。");
                        return;
                    }
                    setFormData({ ...formData, pdfUrl: URL.createObjectURL(file), pdfFile: file });
                } else if (file) {
                    alert("請上傳 PDF 格式的檔案！");
                }
            };

            // 【完全修正】加上防呆防連點與嚴格的空值清理
            const handleSubmit = async (e) => {
                e.preventDefault(); 
                if (isSubmitting) return; // 避免重複點擊
                
                setIsSubmitting(true);
                
                try {
                    let finalPdfUrl = '';
                    
                    if (formData.pdfFile && isOnline) {
                        try {
                            const fileRef = storage.ref(`po_pdfs/${Date.now()}_${formData.pdfFile.name}`);
                            await fileRef.put(formData.pdfFile);
                            finalPdfUrl = await fileRef.getDownloadURL();
                        } catch (pdfError) {
                            alert("PDF 上傳失敗，請確認 Firebase Storage 權限！\n錯誤訊息：" + pdfError.message);
                            setIsSubmitting(false);
                            return; // PDF 上傳失敗就中斷
                        }
                    }

                    const displayId = (formData.displayId && formData.displayId.trim()) ? formData.displayId.trim() : `PO-${Date.now().toString().slice(-6)}`;
                    
                    // 嚴格清理：過濾掉空行，並確保沒有 undefined 會被送進 Firebase
                    const itemsToSave = formData.items
                        .filter(item => (item.model && item.model.trim() !== '') || (item.vendorModel && item.vendorModel.trim() !== ''))
                        .map(item => ({ 
                            model: item.model || '', 
                            vendorModel: item.vendorModel || '', 
                            quantity: Number(item.quantity) || 1, 
                            unitPrice: Number(item.unitPrice) || 0, 
                            unitPriceUsd: Number(item.unitPriceUsd) || 0,
                            remark: item.remark || '' 
                        }));
                        
                    const finalAmount = itemsToSave.reduce((sum, item) => sum + (item.quantity * item.unitPrice), 0);
                    
                    const newOrder = {
                        displayId: displayId || '',
                        vendor: formData.vendor || '', 
                        orderDate: formData.orderDate || '', 
                        deliveryDate: formData.deliveryDate || '',
                        status: '處理中', 
                        amount: finalAmount || 0, 
                        items: itemsToSave, 
                        pdfUrl: finalPdfUrl,
                        createdAt: new Date().toISOString()
                    };

                    await db.collection('po_orders').add(newOrder);
                    
                    setFormData(initialFormState);
                    setShowAddForm(false);
                    setIsCustomVendor(false);
                    
                } catch (error) {
                    console.error("寫入 Firebase 失敗:", error);
                    alert(`儲存失敗！\n詳細錯誤訊息：${error.message}`);
                } finally {
                    setIsSubmitting(false); // 成功或失敗都會解除按鈕鎖定
                }
            };

            const handleCompleteOrder = async (orderDbId) => {
                if (!completeData.date) return alert("請選擇完成時間");
                try {
                    await db.collection('po_orders').doc(orderDbId).update({
                        status: '已收貨',
                        completionData: { date: completeData.date, remark: completeData.remark }
                    });
                    setCompleteData({ date: todayStr, remark: '' });
                    setExpandedOrderId(null);
                } catch (error) {
                    console.error("更新失敗:", error);
                }
            };

            const saveEditedItems = async () => {
                const validItems = editingItems.items
                    .filter(item => (item.model && item.model.trim() !== '') || (item.vendorModel && item.vendorModel.trim() !== ''))
                    .map(item => ({ 
                        ...item, 
                        unitPrice: Number(item.unitPrice) || 0,
                        unitPriceUsd: Number(item.unitPriceUsd) || 0,
                        quantity: Number(item.quantity) || 1 
                    }));
                
                const newAmount = validItems.reduce((sum, item) => sum + (item.quantity * item.unitPrice), 0);

                try {
                    await db.collection('po_orders').doc(editingItems.orderId).update({ 
                        items: validItems,
                        amount: newAmount
                    });
                    setEditingItems({ orderId: null, items: [] });
                } catch (error) {
                    console.error("更新失敗:", error);
                }
            };

            const handleSavePrice = async (e) => {
                e.preventDefault();
                if(!priceModal.model || !priceModal.price || !priceModal.reason) return alert("請填寫完整必填資訊與變更原因");
                
                const newHistoryEntry = {
                    date: new Date().toISOString(),
                    price: Number(priceModal.price),
                    priceUsd: priceModal.priceUsd ? Number(priceModal.priceUsd) : null,
                    reason: priceModal.reason
                };

                try {
                    if (priceModal.id) {
                        await db.collection('po_prices').doc(priceModal.id).update({
                            price: Number(priceModal.price),
                            priceUsd: priceModal.priceUsd ? Number(priceModal.priceUsd) : null,
                            history: firebase.firestore.FieldValue.arrayUnion(newHistoryEntry)
                        });
                    } else {
                        await db.collection('po_prices').add({
                            model: priceModal.model,
                            price: Number(priceModal.price),
                            priceUsd: priceModal.priceUsd ? Number(priceModal.priceUsd) : null,
                            history: [newHistoryEntry]
                        });
                    }
                    setPriceModal({ isOpen: false, id: null, model: '', price: '', priceUsd: '', reason: '' });
                } catch (error) {
                    console.error(error);
                    alert("單價儲存失敗！");
                }
            };

            const totalAmount = orders.reduce((sum, order) => sum + order.amount, 0);
            let processedOrders = orders.filter(o => {
                if (activeFilter === 'PROCESSING' && o.status !== '處理中') return false;
                if (activeFilter === 'OVERDUE' && !getAlertInfo(o.deliveryDate, o.status).text.includes('已逾期')) return false;
                if (searchQuery && !o.displayId?.toLowerCase().includes(searchQuery.toLowerCase()) && !o.vendor?.toLowerCase().includes(searchQuery.toLowerCase())) return false;
                if (dateRange.start && o.orderDate < dateRange.start) return false;
                if (dateRange.end && o.orderDate > dateRange.end) return false;
                return true;
            });
            processedOrders.sort((a, b) => {
                const timeA = new Date(a.orderDate || 0).getTime();
                const timeB = new Date(b.orderDate || 0).getTime();
                return sortOrder === 'desc' ? timeB - timeA : timeA - timeB;
            });

            if (isLoading) return <div className="min-h-screen flex items-center justify-center font-bold text-blue-600"><i className="fas fa-sync fa-spin mr-2"></i>連線雲端資料庫中...</div>;

            let currentMonthGroup = '';

            if (currentView === 'PRICE_MANAGEMENT' && isAdmin) {
                return (
                    <div className="max-w-4xl mx-auto p-4 md:p-8 space-y-5">
                        <div className="bg-white p-4 rounded-xl shadow-sm flex justify-between items-center border border-gray-200">
                            <h1 className="text-xl font-bold text-gray-900"><i className="fas fa-tags text-blue-600 mr-2"></i>精機單價管理中心</h1>
                            <button onClick={() => setCurrentView('PO_LIST')} className="bg-gray-100 text-gray-700 px-4 py-2 rounded-lg text-sm font-bold hover:bg-gray-200">
                                <i className="fas fa-arrow-left mr-2"></i>返回採購單
                            </button>
                        </div>

                        <div className="bg-white rounded-xl shadow-sm border p-5">
                            <div className="flex justify-between items-center mb-4">
                                <h2 className="font-bold text-lg">現有型號單價表</h2>
                                <button onClick={() => setPriceModal({ isOpen: true, id: null, model: '', price: '', priceUsd: '', reason: '' })} className="bg-blue-600 text-white px-3 py-1.5 rounded text-sm font-medium hover:bg-blue-700">
                                    <i className="fas fa-plus mr-1"></i> 新增機型
                                </button>
                            </div>
                            <table className="w-full text-left">
                                <thead className="bg-gray-100 text-sm">
                                    <tr>
                                        <th className="p-3">精機型號</th>
                                        <th className="p-3 text-right">目前單價 (RMB)</th>
                                        <th className="p-3 text-right border-l">單價 (USD)</th>
                                        <th className="p-3 text-center">操作</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y text-sm">
                                    {prices.map(p => (
                                        <tr key={p.id} className="hover:bg-gray-50">
                                            <td className="p-3 font-bold">{p.model}</td>
                                            <td className="p-3 text-right font-medium text-blue-700">{formatRMB(p.price)}</td>
                                            <td className="p-3 text-right text-gray-600 border-l">{formatUSD(p.priceUsd)}</td>
                                            <td className="p-3 text-center">
                                                <button onClick={() => setPriceModal({ isOpen: true, id: p.id, model: p.model, price: p.price, priceUsd: p.priceUsd || '', reason: '' })} className="text-blue-600 hover:text-blue-800 mx-2" title="修改價格"><i className="fas fa-edit"></i> 修改</button>
                                                <button onClick={() => setHistoryModal({ isOpen: true, model: p.model, history: p.history || [] })} className="text-gray-500 hover:text-gray-800 mx-2" title="歷史紀錄"><i className="fas fa-history"></i> 紀錄</button>
                                            </td>
                                        </tr>
                                    ))}
                                    {prices.length === 0 && <tr><td colSpan="4" className="p-5 text-center text-gray-500">尚無單價資料，請點擊右上方新增。</td></tr>}
                                </tbody>
                            </table>
                        </div>

                        {priceModal.isOpen && (
                            <div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
                                <div className="bg-white rounded-xl shadow-2xl p-6 w-full max-w-md">
                                    <h2 className="text-lg font-bold mb-4">{priceModal.id ? '修改單價' : '新增機型單價'}</h2>
                                    <form onSubmit={handleSavePrice} className="space-y-4">
                                        <div>
                                            <label className="block text-xs font-bold mb-1">精機型號</label>
                                            <input type="text" value={priceModal.model} disabled={!!priceModal.id} onChange={e => setPriceModal({...priceModal, model: e.target.value})} className="w-full border p-2 rounded text-sm disabled:bg-gray-100" required />
                                        </div>
                                        <div className="flex gap-3">
                                            <div className="flex-1">
                                                <label className="block text-xs font-bold mb-1 text-blue-800">單價 (RMB) <span className="text-red-500">*必填</span></label>
                                                <input type="number" step="0.01" value={priceModal.price} onChange={e => setPriceModal({...priceModal, price: e.target.value})} className="w-full border p-2 rounded text-sm" required min="0" />
                                            </div>
                                            <div className="flex-1">
                                                <label className="block text-xs font-bold mb-1 text-gray-700">單價 (USD) <span className="text-gray-400 font-normal">選填</span></label>
                                                <input type="number" step="0.01" value={priceModal.priceUsd} onChange={e => setPriceModal({...priceModal, priceUsd: e.target.value})} className="w-full border p-2 rounded text-sm" min="0" placeholder="留白表示無" />
                                            </div>
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold mb-1 text-red-600">本次異動原因 (必填)</label>
                                            <input type="text" value={priceModal.reason} placeholder="例如：年度調漲、新增品項..." onChange={e => setPriceModal({...priceModal, reason: e.target.value})} className="w-full border border-red-200 focus:border-red-500 p-2 rounded text-sm outline-none" required />
                                        </div>
                                        <div className="flex gap-2 mt-4">
                                            <button type="button" onClick={() => setPriceModal({isOpen: false, id: null, model: '', price: '', priceUsd: '', reason: ''})} className="flex-1 py-2 bg-gray-100 rounded text-sm">取消</button>
                                            <button type="submit" className="flex-1 py-2 bg-blue-600 text-white rounded text-sm font-bold">儲存並記錄</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        )}

                        {historyModal.isOpen && (
                            <div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
                                <div className="bg-white rounded-xl shadow-2xl p-6 w-full max-w-lg max-h-[80vh] overflow-y-auto">
                                    <div className="flex justify-between items-center mb-4 border-b pb-2">
                                        <h2 className="text-lg font-bold text-gray-800">【{historyModal.model}】價格異動紀錄</h2>
                                        <button onClick={() => setHistoryModal({isOpen: false, model: '', history: []})} className="text-gray-400 hover:text-gray-800"><i className="fas fa-times"></i></button>
                                    </div>
                                    <ul className="space-y-3">
                                        {[...historyModal.history].reverse().map((record, i) => (
                                            <li key={i} className="bg-gray-50 border p-3 rounded text-sm">
                                                <div className="flex justify-between mb-1">
                                                    <div>
                                                        <span className="font-bold text-blue-700 mr-3">{formatRMB(record.price)}</span>
                                                        <span className="text-gray-500">{formatUSD(record.priceUsd)}</span>
                                                    </div>
                                                    <span className="text-xs text-gray-500"><i className="far fa-clock mr-1"></i>{new Date(record.date).toLocaleString()}</span>
                                                </div>
                                                <p className="text-gray-600 text-xs mt-1">原因：{record.reason}</p>
                                            </li>
                                        ))}
                                    </ul>
                                </div>
                            </div>
                        )}
                    </div>
                );
            }

            return (
                <div className="max-w-6xl mx-auto p-4 md:p-8 space-y-5">
                    
                    <datalist id="price-models">
                        {prices.map(p => <option key={p.id} value={p.model} />)}
                    </datalist>

                    {showLoginModal && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
                            <div className="bg-white rounded-xl shadow-2xl p-6 w-full max-w-sm">
                                <h2 className="text-lg font-bold mb-4">管理員登入</h2>
                                <form onSubmit={handleLogin} className="space-y-3">
                                    <input type="text" placeholder="帳號" value={loginForm.username} onChange={e => setLoginForm({...loginForm, username: e.target.value})} className="w-full border p-2 rounded" required />
                                    <input type="password" placeholder="密碼" value={loginForm.password} onChange={e => setLoginForm({...loginForm, password: e.target.value})} className="w-full border p-2 rounded" required />
                                    {loginError && <p className="text-red-500 text-xs">{loginError}</p>}
                                    <div className="flex gap-2 mt-4">
                                        <button type="button" onClick={() => setShowLoginModal(false)} className="flex-1 py-2 bg-gray-100 rounded text-sm">取消</button>
                                        <button type="submit" className="flex-1 py-2 bg-blue-600 text-white rounded text-sm">登入</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    <div className="flex flex-col md:flex-row justify-between items-center bg-white p-4 rounded-xl shadow-sm border border-gray-200">
                        <div>
                            <h1 className="text-xl font-bold text-gray-900">採購交期追蹤系統</h1>
                            <p className="text-xs text-blue-600 font-semibold mt-1"><i className="fas fa-cloud mr-1"></i>已連接 Firebase 雲端</p>
                        </div>
                        <div className="flex items-center gap-3 mt-3 md:mt-0 flex-wrap justify-end">
                            <div className={`px-3 py-1.5 rounded-lg text-sm font-medium ${isOnline ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-700'}`}>
                                <i className={`fas ${isOnline ? 'fa-tower-broadcast' : 'fa-triangle-exclamation'} mr-2`}></i>{isOnline ? '連線中' : '系統離線'}
                            </div>
                            
                            {isAdmin && (
                                <button onClick={() => setCurrentView('PRICE_MANAGEMENT')} className="px-3 py-1.5 bg-blue-100 text-blue-700 rounded-lg text-sm font-bold hover:bg-blue-200 shadow-sm border border-blue-200">
                                    <i className="fas fa-tags mr-2"></i>單價管理
                                </button>
                            )}

                            {currentUser ? (
                                <button onClick={handleLogout} className="px-3 py-1.5 bg-gray-100 text-gray-700 rounded-lg text-sm font-medium border border-gray-300">
                                    <i className="fas fa-sign-out-alt mr-2"></i>登出 ({currentUser})
                                </button>
                            ) : (
