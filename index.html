<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>採購單管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-storage-compat.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const firebaseConfig = {
            apiKey: "AIzaSyB9VcueWD3AdLENr5Jdp0__pRVCYtJ95no",
            authDomain: "pms-kingtex.firebaseapp.com",
            projectId: "pms-kingtex",
            storageBucket: "pms-kingtex.firebasestorage.app",
            messagingSenderId: "950519740298",
            appId: "1:950519740298:web:19e78a0fb18f6788083a73",
            measurementId: "G-Y9DL3C4X2E"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const storage = firebase.storage();

        function App() {
            const TODAY = new Date('2026-07-03');
            const [orders, setOrders] = useState([]);
            const [showAddForm, setShowAddForm] = useState(false);
            const [expandedOrderId, setExpandedOrderId] = useState(null);
            const [currentUser, setCurrentUser] = useState(null);
            const [formData, setFormData] = useState({ 
                displayId: '', vendor: '', orderDate: TODAY.toISOString().split('T')[0], 
                deliveryDate: '', amount: '', items: [{ model: '', quantity: 1, remark: '' }], pdfFile: null 
            });

            useEffect(() => {
                auth.signInAnonymously();
                return db.collection('po_orders').onSnapshot(snap => setOrders(snap.docs.map(doc => ({ dbId: doc.id, ...doc.data() }))));
            }, []);

            const handleSubmit = async (e) => {
                e.preventDefault();
                let finalPdfUrl = null;
                if (formData.pdfFile) {
                    const ref = storage.ref(`po_pdfs/${Date.now()}_${formData.pdfFile.name}`);
                    await ref.put(formData.pdfFile);
                    finalPdfUrl = await ref.getDownloadURL();
                }
                await db.collection('po_orders').add({
                    ...formData,
                    displayId: formData.displayId || `PO-${Date.now().toString().slice(-6)}`,
                    status: '處理中',
                    amount: parseInt(formData.amount),
                    pdfUrl: finalPdfUrl,
                    createdAt: new Date().toISOString()
                });
                setFormData({ vendor: '', displayId: '', orderDate: TODAY.toISOString().split('T')[0], deliveryDate: '', amount: '', items: [{ model: '', quantity: 1, remark: '' }], pdfFile: null });
                setShowAddForm(false);
            };

            return (
                <div className="max-w-6xl mx-auto p-4 space-y-5">
                    {/* 標題與登入 */}
                    <div className="bg-white p-4 rounded-xl shadow-sm flex justify-between items-center">
                        <h1 className="font-bold text-lg">採購交期追蹤系統</h1>
                        <button onClick={() => setCurrentUser(currentUser ? null : 'Ryan')} className="bg-blue-50 text-blue-700 px-3 py-1 rounded text-sm">
                            {currentUser ? '登出(Ryan)' : '管理員登入'}
                        </button>
                    </div>

                    {/* 新增表單 */}
                    {showAddForm && (
                        <div className="bg-white p-5 rounded-xl border">
                            <h2 className="font-bold mb-3">新增採購單</h2>
                            <form onSubmit={handleSubmit} className="grid grid-cols-1 md:grid-cols-4 gap-3">
                                <input type="text" placeholder="採購單號" value={formData.displayId} onChange={e => setFormData({...formData, displayId: e.target.value})} className="border p-2 rounded text-sm" required />
                                <input type="text" placeholder="供應商" value={formData.vendor} onChange={e => setFormData({...formData, vendor: e.target.value})} className="border p-2 rounded text-sm" required />
                                <input type="date" value={formData.orderDate} onChange={e => setFormData({...formData, orderDate: e.target.value})} className="border p-2 rounded text-sm" />
                                <input type="number" placeholder="金額" value={formData.amount} onChange={e => setFormData({...formData, amount: e.target.value})} className="border p-2 rounded text-sm" required />
                                <button type="submit" className="col-span-full bg-gray-900 text-white p-2 rounded text-sm font-bold">送出</button>
                            </form>
                        </div>
                    )}

                    {/* 表格 */}
                    <table className="w-full bg-white rounded-lg shadow-sm">
                        <thead className="bg-gray-100 text-xs">
                            <tr>
                                <th className="p-3">採購單號</th>
                                <th className="p-3">供應商</th>
                                <th className="p-3">訂單日期</th>
                                <th className="p-3">狀態</th>
                            </tr>
                        </thead>
                        <tbody>
                            {orders.map(o => (
                                <tr key={o.dbId} className="border-t text-sm text-center">
                                    <td className="p-3 font-bold">{o.displayId}</td>
                                    <td className="p-3">{o.vendor}</td>
                                    <td className="p-3">{o.orderDate}</td>
                                    <td className="p-3">{o.status}</td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
