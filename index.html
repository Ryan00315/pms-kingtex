<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>採購單管理系統</title>
    
    <link rel="shortcut icon" href="k-192.png" type="image/png">
    <link rel="apple-touch-icon" href="k-192.png">
    <link rel="manifest" href="manifest.json">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="採購系統">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const firebaseConfig = {
            apiKey: "AIzaSyB9VcueWD3AdLENr5Jdp0__pRVCYtJ95no",
            authDomain: "pms-kingtex.firebaseapp.com",
            projectId: "pms-kingtex",
            storageBucket: "pms-kingtex.firebasestorage.app",
            messagingSenderId: "950519740298",
            appId: "1:950519740298:web:19e78a0fb18f6788083a73",
            measurementId: "G-Y9DL3C4X2E"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        function App() {
            const d = new Date();
            const todayStr = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
            const [orders, setOrders] = useState([]);
            const [prices, setPrices] = useState([]); 
            const [vendors, setVendors] = useState([]); 
            const [currentView, setCurrentView] = useState('PO_LIST'); 
            const [expandedOrderId, setExpandedOrderId] = useState(null);
            const [editingItems, setEditingItems] = useState({ orderId: null, items: [] });
            const [editingHeader, setEditingHeader] = useState({ id: null, displayId: '', vendor: '', orderDate: '', deliveryDate: '' });
            const [sortOrder, setSortOrder] = useState('desc');
            const [isLoading, setIsLoading] = useState(true);

            // 讀取資料邏輯 (省略細節以縮短，與您現有邏輯一致)
            useEffect(() => {
                auth.signInAnonymously();
                const unsubOrders = db.collection('po_orders').onSnapshot(s => {
                    setOrders(s.docs.map(doc => ({ dbId: doc.id, ...doc.data() })));
                    setIsLoading(false);
                });
                const unsubPrices = db.collection('po_prices').onSnapshot(s => setPrices(s.docs.map(d => ({id: d.id, ...d.data()}))));
                const unsubVendors = db.collection('po_vendors').onSnapshot(s => setVendors(s.docs.map(d => ({id: d.id, ...d.data()}))));
                return () => { unsubOrders(); unsubPrices(); unsubVendors(); };
            }, []);

            // 強制排序邏輯：月份 > 單號
            const processedOrders = [...orders].sort((a, b) => {
                const dateA = new Date(a.orderDate || 0);
                const dateB = new Date(b.orderDate || 0);
                const mY = (d) => d.getFullYear() * 12 + d.getMonth();
                
                if (mY(dateA) !== mY(dateB)) return sortOrder === 'desc' ? mY(dateB) - mY(dateA) : mY(dateA) - mY(dateB);
                return sortOrder === 'desc' ? (b.displayId || '').localeCompare(a.displayId || '') : (a.displayId || '').localeCompare(b.displayId || '');
            });

            // (其餘 CRUD 函數與 UI 渲染保持一致)
            // 只要確認您的 Table 的 className 包含 "bg-[#f0f7ff]" 即可生效
            
            return (
                /* ... 您的完整 JSX 渲染 ... */
                <div className="p-4">
                    {/* 表格區塊 */}
                    {processedOrders.map(order => (
                        <div key={order.dbId}>
                           {/* 訂單行 */}
                           <div className="border-b hover:bg-gray-50 cursor-pointer p-4" onClick={() => setExpandedOrderId(expandedOrderId === order.dbId ? null : order.dbId)}>
                               {order.displayId} - {order.vendor}
                           </div>
                           {/* 詳情區塊 (已修正背景色) */}
                           {expandedOrderId === order.dbId && (
                               <div className="bg-[#f0f7ff] border-t p-6">
                                   {/* 詳細內容 */}
                               </div>
                           )}
                        </div>
                    ))}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
