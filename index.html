<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>採購單管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-storage-compat.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // Firebase 設定
        const firebaseConfig = {
            apiKey: "AIzaSyB9VcueWD3AdLENr5Jdp0__pRVCYtJ95no",
            authDomain: "pms-kingtex.firebaseapp.com",
            projectId: "pms-kingtex",
            storageBucket: "pms-kingtex.firebasestorage.app",
            messagingSenderId: "950519740298",
            appId: "1:950519740298:web:19e78a0fb18f6788083a73",
            measurementId: "G-Y9DL3C4X2E"
        };

        // 嚴謹的初始化檢查
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        
        const auth = firebase.auth();
        const db = firebase.firestore();
        const storage = firebase.storage();

        function App() {
            const [orders, setOrders] = useState([]);
            const [showAddForm, setShowAddForm] = useState(false);
            const [currentUser, setCurrentUser] = useState(null);
            const [formData, setFormData] = useState({ 
                displayId: '', vendor: '', orderDate: new Date().toISOString().split('T')[0], 
                deliveryDate: '', amount: '', pdfFile: null 
            });

            // 確保監聽器正確執行
            useEffect(() => {
                auth.signInAnonymously().catch(err => console.error("登入錯誤", err));
                
                const unsubscribe = db.collection('po_orders')
                    .onSnapshot(snap => {
                        const data = snap.docs.map(doc => ({ dbId: doc.id, ...doc.data() }));
                        setOrders(data);
                    }, err => console.error("Firestore 錯誤:", err));
                
                return () => unsubscribe();
            }, []);

            const handleSubmit = async (e) => {
                e.preventDefault();
                try {
                    let finalPdfUrl = null;
                    if (formData.pdfFile) {
                        const ref = storage.ref(`po_pdfs/${Date.now()}_${formData.pdfFile.name}`);
                        await ref.put(formData.pdfFile);
                        finalPdfUrl = await ref.getDownloadURL();
                    }
                    
                    await db.collection('po_orders').add({
                        displayId: formData.displayId || `PO-${Date.now().toString().slice(-6)}`,
                        vendor: formData.vendor,
                        orderDate: formData.orderDate,
                        deliveryDate: formData.deliveryDate,
                        amount: parseInt(formData.amount || 0),
                        status: '處理中',
                        pdfUrl: finalPdfUrl,
                        createdAt: new Date().toISOString()
                    });
                    
                    setFormData({ displayId: '', vendor: '', orderDate: new Date().toISOString().split('T')[0], deliveryDate: '', amount: '', pdfFile: null });
                    setShowAddForm(false);
                } catch (err) {
                    alert("操作失敗: " + err.message);
                }
            };

            return (
                <div className="max-w-6xl mx-auto p-4 space-y-5">
                    <div className="bg-white p-4 rounded-xl shadow-sm flex justify-between items-center">
                        <h1 className="font-bold text-lg text-blue-900">採購交期追蹤系統</h1>
                        <div className="flex gap-2">
                            <button onClick={() => setShowAddForm(!showAddForm)} className="bg-gray-900 text-white px-3 py-1 rounded text-sm hover:bg-gray-700">
                                {showAddForm ? '取消新增' : '+ 新增採購單'}
                            </button>
                            <button onClick={() => setCurrentUser(currentUser ? null : 'Ryan')} className="bg-blue-50 text-blue-700 px-3 py-1 rounded text-sm hover:bg-blue-100">
                                {currentUser ? '登出' : '管理員登入'}
                            </button>
                        </div>
                    </div>

                    {showAddForm && (
                        <div className="bg-white p-5 rounded-xl border border-blue-200 shadow-md">
                            <h2 className="font-bold mb-4 text-blue-800">新增採購單</h2>
                            <form onSubmit={handleSubmit} className="grid grid-cols-1 md:grid-cols-4 gap-4">
                                <input type="text" placeholder="採購單號" value={formData.displayId} onChange={e => setFormData({...formData, displayId: e.target.value})} className="border p-2 rounded text-sm w-full" required />
                                <input type="text" placeholder="供應商" value={formData.vendor} onChange={e => setFormData({...formData, vendor: e.target.value})} className="border p-2 rounded text-sm w-full" required />
                                <input type="date" value={formData.orderDate} onChange={e => setFormData({...formData, orderDate: e.target.value})} className="border p-2 rounded text-sm w-full" />
                                <input type="number" placeholder="金額" value={formData.amount} onChange={e => setFormData({...formData, amount: e.target.value})} className="border p-2 rounded text-sm w-full" required />
                                <button type="submit" className="col-span-full bg-blue-600 text-white p-2 rounded text-sm font-bold hover:bg-blue-700">確認新增</button>
                            </form>
                        </div>
                    )}

                    <div className="bg-white rounded-lg shadow-sm overflow-hidden border">
                        <table className="w-full text-left">
                            <thead className="bg-gray-100 text-xs uppercase text-gray-500">
                                <tr>
                                    <th className="p-3">採購單號</th>
                                    <th className="p-3">供應商</th>
                                    <th className="p-3">訂單日期</th>
                                    <th className="p-3">狀態</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-gray-100">
                                {orders.map(o => (
                                    <tr key={o.dbId} className="text-sm">
                                        <td className="p-3 font-bold text-blue-600">{o.displayId}</td>
                                        <td className="p-3">{o.vendor}</td>
                                        <td className="p-3">{o.orderDate}</td>
                                        <td className="p-3">
                                            <span className="bg-green-100 text-green-700 px-2 py-0.5 rounded-full text-xs font-bold">{o.status}</span>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        // 使用 setTimeout 確保 DOM 已完全載入再執行渲染
        window.addEventListener('DOMContentLoaded', () => {
            const rootElement = document.getElementById('root');
            if (rootElement) {
                ReactDOM.createRoot(rootElement).render(<App />);
            }
        });
    </script>
</body>
</html>
