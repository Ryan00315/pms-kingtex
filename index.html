<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>採購單管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-storage-compat.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const firebaseConfig = { apiKey: "AIzaSyB9VcueWD3AdLENr5Jdp0__pRVCYtJ95no", authDomain: "pms-kingtex.firebaseapp.com", projectId: "pms-kingtex", storageBucket: "pms-kingtex.firebasestorage.app", messagingSenderId: "950519740298", appId: "1:950519740298:web:19e78a0fb18f6788083a73" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore(); const storage = firebase.storage();

        function App() {
            const todayStr = new Date().toISOString().split('T')[0];
            const [orders, setOrders] = useState([]);
            const [prices, setPrices] = useState([]);
            const [currentUser, setCurrentUser] = useState(null);
            const [showAddForm, setShowAddForm] = useState(false);
            const [formData, setFormData] = useState({ displayId: '', vendor: '', orderDate: todayStr, deliveryDate: '', amount: '', items: [{ model: '', vendorModel: '', quantity: 1, remark: '' }], pdfFile: null });

            useEffect(() => {
                firebase.auth().signInAnonymously();
                db.collection('po_orders').onSnapshot(s => setOrders(s.docs.map(d => ({ dbId: d.id, ...d.data() }))));
                db.collection('po_prices').onSnapshot(s => setPrices(s.docs.map(d => ({ id: d.id, ...d.data() }))));
            }, []);

            const handleSubmit = async (e) => {
                e.preventDefault();
                let pdfUrl = null;
                if (formData.pdfFile) {
                    const ref = storage.ref(`po_pdfs/${Date.now()}_${formData.pdfFile.name}`);
                    await ref.put(formData.pdfFile);
                    pdfUrl = await ref.getDownloadURL();
                }
                // 自動計算總金額
                const calculatedAmount = formData.items.reduce((sum, item) => {
                    const p = prices.find(x => x.model === item.model);
                    return sum + (p ? p.price * item.quantity : 0);
                }, 0);

                await db.collection('po_orders').add({
                    ...formData,
                    displayId: formData.displayId || `PO-${Date.now().toString().slice(-6)}`,
                    amount: calculatedAmount,
                    status: '處理中',
                    pdfUrl,
                    createdAt: new Date().toISOString()
                });
                setFormData({ displayId: '', vendor: '', orderDate: todayStr, deliveryDate: '', amount: '', items: [{ model: '', vendorModel: '', quantity: 1, remark: '' }], pdfFile: null });
                setShowAddForm(false);
                alert("儲存採購單成功！");
            };

            return (
                <div className="max-w-6xl mx-auto p-4 space-y-5">
                    <div className="bg-white p-4 rounded-xl shadow-sm flex justify-between items-center">
                        <h1 className="font-bold text-lg">採購交期追蹤系統</h1>
                        <div className="flex gap-2">
                            <button onClick={() => setShowAddForm(!showAddForm)} className="bg-gray-900 text-white px-3 py-1 rounded text-sm">{showAddForm ? '取消新增' : '+ 新增採購單'}</button>
                            <button onClick={() => setCurrentUser(currentUser ? null : 'Ryan')} className="bg-blue-600 text-white px-3 py-1 rounded text-sm">{currentUser ? '登出' : '管理員登入'}</button>
                        </div>
                    </div>

                    {showAddForm && (
                        <form onSubmit={handleSubmit} className="bg-white p-6 rounded-xl border shadow-md space-y-4">
                            <h2 className="font-bold border-b pb-2">填寫採購單</h2>
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                                <input type="text" placeholder="採購單號" value={formData.displayId} onChange={e => setFormData({...formData, displayId: e.target.value})} className="border p-2 rounded text-sm" />
                                <input type="text" placeholder="供應商" value={formData.vendor} onChange={e => setFormData({...formData, vendor: e.target.value})} className="border p-2 rounded text-sm" />
                                <input type="date" value={formData.orderDate} onChange={e => setFormData({...formData, orderDate: e.target.value})} className="border p-2 rounded text-sm" />
                                <input type="date" value={formData.deliveryDate} onChange={e => setFormData({...formData, deliveryDate: e.target.value})} className="border p-2 rounded text-sm" />
                            </div>
                            {formData.items.map((item, idx) => (
                                <div key={idx} className="flex gap-2 items-center">
                                    <input list="model-list" placeholder="精機型號" className="border p-2 rounded text-sm w-1/4" value={item.model} onChange={e => { const n=[...formData.items]; n[idx].model=e.target.value; setFormData({...formData, items: n}) }} />
                                    <datalist id="model-list">{prices.map(p => <option key={p.id} value={p.model} />)}</datalist>
                                    <input placeholder="廠商型號" className="border p-2 rounded text-sm w-1/4" value={item.vendorModel} onChange={e => { const n=[...formData.items]; n[idx].vendorModel=e.target.value; setFormData({...formData, items: n}) }} />
                                    <input type="number" placeholder="數量" className="border p-2 rounded text-sm w-16" value={item.quantity} onChange={e => { const n=[...formData.items]; n[idx].quantity=e.target.value; setFormData({...formData, items: n}) }} />
                                    <input placeholder="備註" className="border p-2 rounded text-sm flex-1" value={item.remark} onChange={e => { const n=[...formData.items]; n[idx].remark=e.target.value; setFormData({...formData, items: n}) }} />
                                </div>
                            ))}
                            <button type="submit" className="bg-blue-600 text-white px-6 py-2 rounded font-bold">儲存採購單</button>
                        </form>
                    )}

                    <table className="w-full bg-white rounded-lg shadow-sm border">
                        <thead className="bg-gray-100 text-xs text-gray-600 uppercase">
                            <tr><th className="p-3">訂單編號</th><th className="p-3">供應商</th><th className="p-3">日期</th><th className="p-3">狀態</th></tr>
                        </thead>
                        <tbody>
                            {orders.map(o => (
                                <tr key={o.dbId} className="border-t text-sm text-center">
                                    <td className="p-3 font-bold">{o.displayId}</td>
                                    <td className="p-3">{o.vendor}</td>
                                    <td className="p-3">{o.orderDate}</td>
                                    <td className="p-3">{o.status}</td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
