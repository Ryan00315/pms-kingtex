<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>採購單管理系統</title>

    <link rel="manifest" href="manifest.json">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="採購系統">
    <link rel="apple-touch-icon" href="k-192.png">
    <link rel="shortcut icon" href="k-192.png" type="image/png">
    
    <!-- Tailwind CSS (樣式) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome (圖示) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (讓瀏覽器看得懂 React JSX 語法) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase SDK (Compat 舊版寫法，不包含 Storage) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">
    
    <!-- React 應用程式掛載點 -->
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // 整合了你專屬的 Firebase 設定碼
        const firebaseConfig = {
            apiKey: "AIzaSyB9VcueWD3AdLENr5Jdp0__pRVCYtJ95no",
            authDomain: "pms-kingtex.firebaseapp.com",
            projectId: "pms-kingtex",
            storageBucket: "pms-kingtex.firebasestorage.app",
            messagingSenderId: "950519740298",
            appId: "1:950519740298:web:19e78a0fb18f6788083a73",
            measurementId: "G-Y9DL3C4X2E"
        };

        // 初始化 Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();

        function App() {
            // 動態取得當前電腦的本地日期
            const d = new Date();
            const todayStr = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
            const todayDate = new Date(todayStr);

            const [firebaseUser, setFirebaseUser] = useState(null);
            const [isLoading, setIsLoading] = useState(true);
            const [isOnline, setIsOnline] = useState(navigator.onLine ?? true);
            
            const [orders, setOrders] = useState([]);
            const [prices, setPrices] = useState([]); 
            const [vendors, setVendors] = useState([]); 
            
            const [currentView, setCurrentView] = useState('PO_LIST'); 
            
            const [showAddForm, setShowAddForm] = useState(false);
            const [expandedOrderId, setExpandedOrderId] = useState(null);
            
            const [activeFilter, setActiveFilter] = useState('ALL'); 
            const [searchQuery, setSearchQuery] = useState('');
            const [dateRange, setDateRange] = useState({ start: '', end: '' });
            const [sortOrder, setSortOrder] = useState('desc'); 
            
            // 編輯狀態管理
            const [editingItems, setEditingItems] = useState({ orderId: null, items: [] });
            const [editingHeader, setEditingHeader] = useState({ id: null, displayId: '', vendor: '', orderDate: '', deliveryDate: '' }); 
            
            const [isSubmitting, setIsSubmitting] = useState(false);

            // 權限管理
            const [currentUser, setCurrentUser] = useState(null);
            const isAdmin = currentUser === 'Ryan';
            const [showLoginModal, setShowLoginModal] = useState(false);
            const [loginForm, setLoginForm] = useState({ username: '', password: '' });
            const [loginError, setLoginError] = useState('');

            // 廠商管理狀態
            const [vendorModal, setVendorModal] = useState({ isOpen: false, id: null, name: '', contact: '', address: '', phone: '', remark: '' });

            // 單價管理狀態
            const [priceModal, setPriceModal] = useState({ 
                isOpen: false, id: null, vendor: '', 
                category: '平縫', customCategory: '', mainModel: '', 
                items: [{ model: '', vendorModel: '', price: '', priceUsd: '', remark: '' }], 
                reason: '' 
            });
            const [historyModal, setHistoryModal] = useState({ isOpen: false, model: '', history: [] });
            const [expandedPrices, setExpandedPrices] = useState({});
            
            const [priceSearch, setPriceSearch] = useState({ vendor: '', model: '' });
            
            // 拖曳狀態管理
            const [draggedPriceId, setDraggedPriceId] = useState(null);
            const [draggedMainModel, setDraggedMainModel] = useState(null); 

            // 新增表單
            const initialFormState = {
                displayId: '', vendor: '', orderDate: todayStr, deliveryDate: '',
                items: [{ model: '', vendorModel: '', quantity: 1, unitPrice: '', unitPriceUsd: '', remark: '' }]
            };
            const [formData, setFormData] = useState(initialFormState);
            const [completeData, setCompleteData] = useState({ date: todayStr, remark: '' });

            useEffect(() => {
                const handleOnline = () => setIsOnline(true);
                const handleOffline = () => setIsOnline(false);
                window.addEventListener('online', handleOnline);
                window.addEventListener('offline', handleOffline);
                return () => {
                    window.removeEventListener('online', handleOnline);
                    window.removeEventListener('offline', handleOffline);
                };
            }, []);

            useEffect(() => {
                auth.signInAnonymously().catch(err => console.error("登入失敗", err));
                const unsubscribe = auth.onAuthStateChanged(user => setFirebaseUser(user));
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!firebaseUser) return;
                
                const unsubOrders = db.collection('po_orders').onSnapshot(snapshot => {
                    setOrders(snapshot.docs.map(doc => ({ dbId: doc.id, ...doc.data() })));
                    setIsLoading(false);
                }, err => {
                    console.error("讀取訂單失敗:", err);
                    setIsLoading(false);
                });

                const unsubPrices = db.collection('po_prices').onSnapshot(snapshot => {
                    setPrices(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                }, err => console.error("讀取單價失敗:", err));

                const unsubVendors = db.collection('po_vendors').onSnapshot(snapshot => {
                    const vList = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    vList.sort((a, b) => a.name.localeCompare(b.name));
                    setVendors(vList);
                }, err => console.error("讀取廠商失敗:", err));

                return () => { unsubOrders(); unsubPrices(); unsubVendors(); };
            }, [firebaseUser]);

            const handleLogin = (e) => {
                e.preventDefault();
                if (loginForm.username === 'Ryan' && loginForm.password === 'admin315') {
                    setCurrentUser('Ryan');
                    setShowLoginModal(false);
                    setLoginForm({ username: '', password: '' });
                    setLoginError('');
                } else {
                    setLoginError('帳號或密碼錯誤，請重新輸入');
                }
            };

            const handleLogout = () => {
                setCurrentUser(null);
                setCurrentView('PO_LIST'); 
            };

            const getAlertInfo = (dateStr, status) => {
                if (status === '已收貨') return { text: '無', color: 'text-gray-500', bg: 'bg-gray-100' };
                if (!dateStr) return { text: '未定', color: 'text-gray-500', bg: 'bg-gray-100' };
                const targetDate = new Date(dateStr);
                const diffTime = targetDate - todayDate;
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                if (diffDays < 0) return { text: '● 已逾期', color: 'text-red-700', bg: 'bg-red-100' };
                if (diffDays <= 3) return { text: '● 即將到期', color: 'text-orange-700', bg: 'bg-orange-100' };
                return { text: '正常', color: 'text-green-700', bg: 'bg-green-100' };
            };

            const formatRMB = (amount) => new Intl.NumberFormat('zh-CN', { style: 'currency', currency: 'CNY', maximumFractionDigits: 2 }).format(amount || 0);
            const formatUSD = (amount) => amount ? new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 2 }).format(amount) : '-';
            const isUnquoted = (val) => String(val).toUpperCase().trim() === 'N';
            
            const calculateFormTotal = () => {
                return formData.items.reduce((sum, item) => {
                    const price = isUnquoted(item.unitPrice) ? 0 : (Number(item.unitPrice) || 0);
                    const qty = parseInt(item.quantity) || 0;
                    return sum + (price * qty);
                }, 0);
            };

            const handleSaveVendor = async (e) => {
                e.preventDefault();
                if (!vendorModal.name.trim()) return alert("請填寫廠商名稱");
                
                try {
                    const vData = {
                        name: vendorModal.name.trim(),
                        contact: vendorModal.contact.trim(),
                        address: vendorModal.address.trim(),
                        phone: vendorModal.phone.trim()
                    };
                    
                    if (vendorModal.id) {
                        await db.collection('po_vendors').doc(vendorModal.id).update(vData);
                    } else {
                        await db.collection('po_vendors').add(vData);
                    }
                    setVendorModal({ isOpen: false, id: null, name: '', contact: '', address: '', phone: '' });
                } catch (error) {
                    console.error("廠商儲存失敗:", error);
                    alert("廠商儲存失敗！");
                }
            };

            // --- 修改後的 handleSavePrice 函式 ---
            const handleSavePrice = async (e) => {
                e.preventDefault();
                const finalCategory = priceModal.category === '新增' ? priceModal.customCategory.trim() : priceModal.category;
                if (!finalCategory) return alert("請選擇或輸入分類");
                if (!priceModal.mainModel.trim()) return alert("請填寫主型號");
            
                try {
                    const batch = db.batch();
                    
                    if (priceModal.id) {
                        const item = priceModal.items[0];
                        const oldPrice = prices.find(p => p.id === priceModal.id)?.price;
                        const rmbVal = item.price.toString().trim().toUpperCase() === 'N' ? 'N' : Number(item.price);
                        
                        // --- 核心邏輯：檢查單價是否變更 ---
                        const isPriceChanged = (rmbVal !== oldPrice);
                        if (isPriceChanged && !priceModal.reason.trim()) {
                            return alert("單價已變更，請務必填寫「本次異動原因」！");
                        }
            
                        const usdVal = (item.priceUsd && item.priceUsd.toString().trim().toUpperCase() === 'N') ? 'N' : (item.priceUsd ? Number(item.priceUsd) : null);
                        const newHistoryEntry = { date: new Date().toISOString(), price: rmbVal, priceUsd: usdVal, reason: priceModal.reason || '無' };
            
                        const docRef = db.collection('po_prices').doc(priceModal.id);
                        batch.update(docRef, {
                            vendor: priceModal.vendor,
                            category: finalCategory,
                            mainModel: priceModal.mainModel.trim(),
                            model: item.model,
                            vendorModel: item.vendorModel || '',
                            price: rmbVal,
                            priceUsd: usdVal,
                            remark: item.remark || '',
                            history: firebase.firestore.FieldValue.arrayUnion(newHistoryEntry)
                        });
                    } else {
                        // 新增時，通常預設視為新單價，若為新增則強制檢查原因
                        if (!priceModal.reason.trim()) return alert("請填寫「本次異動原因/說明」");
                        
                        priceModal.items.forEach((item, index) => {
                            if (!item.model.trim()) return;
                            const rmbVal = item.price.toString().trim().toUpperCase() === 'N' ? 'N' : Number(item.price);
                            const usdVal = (item.priceUsd && item.priceUsd.toString().trim().toUpperCase() === 'N') ? 'N' : (item.priceUsd ? Number(item.priceUsd) : null);
                            const newHistoryEntry = { date: new Date().toISOString(), price: rmbVal, priceUsd: usdVal, reason: priceModal.reason };
                            
                            const docRef = db.collection('po_prices').doc();
                            batch.set(docRef, {
                                vendor: priceModal.vendor,
                                category: finalCategory,
                                mainModel: priceModal.mainModel.trim(),
                                model: item.model,
                                vendorModel: item.vendorModel || '',
                                price: rmbVal,
                                priceUsd: usdVal,
                                remark: item.remark || '',
                                sortIndex: 9999 + index,
                                history: [newHistoryEntry]
                            });
                        });
                    }
                    await batch.commit();
                    setPriceModal({ isOpen: false, id: null, vendor: '', category: '平縫', customCategory: '', mainModel: '', items: [{ model: '', vendorModel: '', price: '', priceUsd: '', remark: '' }], reason: '' });
                } catch (error) {
                    console.error(error);
                    alert("單價儲存失敗，請檢查網路！");
                }
            };

            // --- 修改表單中的異動原因輸入框 ---
            // 在 priceModal.isOpen 的 form 內，找到 reason 欄位：
            <div className="mt-4 pt-4 border-t">
                {/* 這裡移除 required，將提示文字改為條件式呈現 */}
                <label className="block text-xs font-bold mb-1 text-gray-600">
                    本次異動原因 / 記錄備註 
                    <span className="text-gray-400 font-normal"> (僅修改單價時需填寫)</span>
                </label>
                <input 
                    type="text" 
                    value={priceModal.reason} 
                    placeholder="若修改單價，請務必填寫此處" 
                    onChange={e => setPriceModal({...priceModal, reason: e.target.value})} 
                    className="w-full border border-gray-200 p-2 rounded text-sm outline-none focus:ring-1 focus:ring-blue-500" 
                />
            </div>

            const handleDeletePriceItem = async (itemId) => {
                if (window.confirm("確定要永久刪除此細項單價嗎？此動作無法復原！")) {
                    try {
                        await db.collection('po_prices').doc(itemId).delete();
                    } catch (error) {
                        console.error("刪除單價失敗:", error);
                        alert("刪除失敗！請檢查網路連線。");
                    }
                }
            };

            const handleSubmit = async (e) => {
                e.preventDefault(); 
                if (isSubmitting) return; 
                setIsSubmitting(true);
                
                try {
                    const displayId = (formData.displayId && formData.displayId.trim()) ? formData.displayId.trim() : `PO-${Date.now().toString().slice(-6)}`;
                    const itemsToSave = formData.items
                        .filter(item => (item.model && item.model.trim() !== '') || (item.vendorModel && item.vendorModel.trim() !== ''))
                        .map(item => ({ 
                            model: item.model || '', 
                            vendorModel: item.vendorModel || '', 
                            quantity: Number(item.quantity) || 1, 
                            unitPrice: Number(item.unitPrice) || 0, 
                            unitPriceUsd: Number(item.unitPriceUsd) || 0,
                            remark: item.remark || '' 
                        }));
                        
                    const finalAmount = itemsToSave.reduce((sum, item) => sum + (item.quantity * item.unitPrice), 0);
                    
                    const newOrder = {
                        displayId: displayId || '',
                        vendor: formData.vendor || '', 
                        orderDate: formData.orderDate || '', 
                        deliveryDate: formData.deliveryDate || '',
                        status: '處理中', 
                        amount: finalAmount || 0, 
                        items: itemsToSave, 
                        createdAt: new Date().toISOString()
                    };

                    await db.collection('po_orders').add(newOrder);
                    setFormData(initialFormState);
                    setShowAddForm(false);
                } catch (error) {
                    console.error("寫入 Firebase 失敗:", error);
                    alert(`儲存失敗！\n詳細錯誤訊息：${error.message}`);
                } finally {
                    setIsSubmitting(false); 
                }
            };

            const handleCompleteOrder = async (orderDbId) => {
                if (!completeData.date) return alert("請選擇完成時間");
                try {
                    await db.collection('po_orders').doc(orderDbId).update({
                        status: '已收貨',
                        completionData: { date: completeData.date, remark: completeData.remark }
                    });
                    setCompleteData({ date: todayStr, remark: '' });
                    setExpandedOrderId(null);
                } catch (error) {
                    console.error("更新失敗:", error);
                }
            };

            const saveEditedItems = async () => {
                const validItems = editingItems.items
                    .filter(item => (item.model && item.model.trim() !== '') || (item.vendorModel && item.vendorModel.trim() !== ''))
                    .map(item => ({ 
                        ...item, 
                        unitPrice: Number(item.unitPrice) || 0,
                        unitPriceUsd: Number(item.unitPriceUsd) || 0,
                        quantity: Number(item.quantity) || 1 
                    }));
                const newAmount = validItems.reduce((sum, item) => sum + (item.quantity * item.unitPrice), 0);
                try {
                    await db.collection('po_orders').doc(editingItems.orderId).update({ 
                        items: validItems, amount: newAmount
                    });
                    setEditingItems({ orderId: null, items: [] });
                } catch (error) {
                    console.error("更新失敗:", error);
                }
            };

            const saveEditedHeader = async () => {
                try {
                    await db.collection('po_orders').doc(editingHeader.id).update({
                        displayId: editingHeader.displayId, vendor: editingHeader.vendor,
                        orderDate: editingHeader.orderDate, deliveryDate: editingHeader.deliveryDate
                    });
                    setEditingHeader({ id: null, displayId: '', vendor: '', orderDate: '', deliveryDate: '' });
                } catch (error) {
                    console.error("更新採購單資訊失敗:", error);
                    alert("更新失敗！");
                }
            };

            const handleDeleteOrder = async (orderDbId) => {
                if (window.confirm("確定要永久刪除這筆採購單嗎？此動作無法復原！")) {
                    try {
                        await db.collection('po_orders').doc(orderDbId).delete();
                        setExpandedOrderId(null); 
                    } catch (error) {
                        console.error("刪除採購單失敗:", error);
                        alert("刪除失敗！");
                    }
                }
            };

            const handleDeleteItem = async (order, itemIndex) => {
                if (order.items.length <= 1) {
                    return alert("採購單至少需要保留一項明細！若要全部刪除，請直接點擊右上角的「刪除採購單」。");
                }
                if (window.confirm("確定要刪除此項明細嗎？")) {
                    const newItems = order.items.filter((_, i) => i !== itemIndex);
                    const newAmount = newItems.reduce((sum, item) => sum + (item.quantity * item.unitPrice), 0);
                    try {
                        await db.collection('po_orders').doc(order.dbId).update({ items: newItems, amount: newAmount });
                    } catch (error) {
                        console.error("刪除明細失敗:", error);
                        alert("刪除失敗！");
                    }
                }
            };

            // 細項的拖曳邏輯
            const handleDragStart = (e, id) => {
                setDraggedPriceId(id);
                e.dataTransfer.effectAllowed = "move";
                e.currentTarget.style.opacity = '0.4';
            };
            const handleDragEnd = (e) => {
                e.currentTarget.style.opacity = '1';
                setDraggedPriceId(null);
            };
            const handleDragOver = (e) => {
                e.preventDefault(); 
                e.dataTransfer.dropEffect = "move";
            };
            const handleDrop = async (e, targetId, subGroupArr) => {
                e.preventDefault();
                if (!draggedPriceId || draggedPriceId === targetId) return;

                const group = [...subGroupArr];
                const draggedIdx = group.findIndex(p => p.id === draggedPriceId);
                const targetIdx = group.findIndex(p => p.id === targetId);
                
                if(draggedIdx === -1 || targetIdx === -1) return;

                const [draggedItem] = group.splice(draggedIdx, 1);
                group.splice(targetIdx, 0, draggedItem);

                try {
                    const batch = db.batch();
                    group.forEach((item, index) => {
                        const ref = db.collection('po_prices').doc(item.id);
                        batch.update(ref, { sortIndex: index });
                    });
                    await batch.commit();
                } catch (error) {
                    console.error("順序更新失敗:", error);
                    alert("順序更新失敗，請檢查網路連線。");
                }
                setDraggedPriceId(null);
            };

            // 主型號的拖曳邏輯
            const handleMainModelDragStart = (e, vendor, category, mainModel) => {
                e.stopPropagation();
                setDraggedMainModel({ vendor, category, mainModel });
                e.dataTransfer.effectAllowed = "move";
                e.currentTarget.style.opacity = '0.4';
            };
            const handleMainModelDragEnd = (e) => {
                e.currentTarget.style.opacity = '1';
                setDraggedMainModel(null);
            };
            const handleMainModelDragOver = (e) => {
                e.preventDefault();
                e.dataTransfer.dropEffect = "move";
            };
            const handleMainModelDrop = async (e, targetVendor, targetCategory, targetMainModel) => {
                e.preventDefault();
                e.stopPropagation();

                if (!draggedMainModel) return;
                // 只能在相同的廠商和分類下拖曳排序
                if (draggedMainModel.vendor !== targetVendor || draggedMainModel.category !== targetCategory) return;
                if (draggedMainModel.mainModel === targetMainModel) {
                    setDraggedMainModel(null);
                    return;
                }

                // 取得這個分類下目前所有的主型號陣列，並依照目前的 groupSortIndex 排序
                const categoryGroups = nestedPrices[targetVendor][targetCategory];
                const sortedKeys = Object.keys(categoryGroups).sort((a, b) => {
                    const idxA = categoryGroups[a][0]?.groupSortIndex ?? 9999;
                    const idxB = categoryGroups[b][0]?.groupSortIndex ?? 9999;
                    return idxA - idxB;
                });

                const draggedIdx = sortedKeys.indexOf(draggedMainModel.mainModel);
                const targetIdx = sortedKeys.indexOf(targetMainModel);
                if (draggedIdx === -1 || targetIdx === -1) return;

                // 重新排序陣列
                sortedKeys.splice(draggedIdx, 1);
                sortedKeys.splice(targetIdx, 0, draggedMainModel.mainModel);

                try {
                    const batch = db.batch();
                    // 迴圈跑新的主型號排序，把該主型號下所有的細項都更新為新的 groupSortIndex
                    sortedKeys.forEach((mm, index) => {
                        const itemsInMainModel = categoryGroups[mm];
                        itemsInMainModel.forEach(item => {
                            const ref = db.collection('po_prices').doc(item.id);
                            batch.update(ref, { groupSortIndex: index });
                        });
                    });
                    await batch.commit();
                } catch (error) {
                    console.error("主型號排序更新失敗:", error);
                    alert("順序更新失敗，請檢查網路連線。");
                }
                setDraggedMainModel(null);
            };

            const totalAmount = orders.reduce((sum, order) => sum + order.amount, 0);
            let processedOrders = orders.filter(o => {
                if (activeFilter === 'PROCESSING' && o.status !== '處理中') return false;
                if (activeFilter === 'OVERDUE' && !getAlertInfo(o.deliveryDate, o.status).text.includes('已逾期')) return false;
                if (searchQuery && !o.displayId?.toLowerCase().includes(searchQuery.toLowerCase()) && !o.vendor?.toLowerCase().includes(searchQuery.toLowerCase())) return false;
                if (dateRange.start && o.orderDate < dateRange.start) return false;
                if (dateRange.end && o.orderDate > dateRange.end) return false;
                return true;
            });
            
            processedOrders.sort((a, b) => {
                const dateA = new Date(a.orderDate || 0);
                const dateB = new Date(b.orderDate || 0);
                const monthA = dateA.getFullYear() * 12 + dateA.getMonth();
                const monthB = dateB.getFullYear() * 12 + dateB.getMonth();
                if (monthA !== monthB) return sortOrder === 'desc' ? monthB - monthA : monthA - monthB;
                const idA = a.displayId || '';
                const idB = b.displayId || '';

                                                                                        }}/>
                                                                                    <div className="flex gap-1">
                                                                                        <input type="number" step="0.01" className="border p-1 text-xs w-1/2 rounded text-center outline-none focus:ring-1 focus:ring-blue-500 bg-white" placeholder="RMB" value={item.unitPrice} onChange={e=>{const n=[...editingItems.items]; n[idx].unitPrice=e.target.value; setEditingItems({...editingItems,items:n})}}/>
                                                                                        <input type="number" step="0.01" className="border p-1 text-xs w-1/2 rounded text-center outline-none focus:ring-1 focus:ring-blue-500 bg-white" placeholder="USD" value={item.unitPriceUsd || ''} onChange={e=>{const n=[...editingItems.items]; n[idx].unitPriceUsd=e.target.value; setEditingItems({...editingItems,items:n})}}/>
                                                                                    </div>
                                                                                </div>
                                                                                <input className="border p-1.5 text-sm w-full sm:w-32 rounded outline-none focus:ring-1 focus:ring-blue-500 shrink-0" placeholder="廠商型號" value={item.vendorModel || ''} onChange={e=>{const n=[...editingItems.items]; n[idx].vendorModel=e.target.value; setEditingItems({...editingItems,items:n})}}/>
                                                                                <input type="number" className="border p-1.5 text-sm w-14 rounded text-center outline-none focus:ring-1 focus:ring-blue-500 shrink-0" placeholder="數量" value={item.quantity} onChange={e=>{const n=[...editingItems.items]; n[idx].quantity=e.target.value; setEditingItems({...editingItems,items:n})}}/>
                                                                                <input className="border p-1.5 text-sm flex-1 min-w-[80px] w-full rounded outline-none focus:ring-1 focus:ring-blue-500" placeholder="備註" value={item.remark} onChange={e=>{const n=[...editingItems.items]; n[idx].remark=e.target.value; setEditingItems({...editingItems,items:n})}}/>
                                                                                <button onClick={()=>{const n=editingItems.items.filter((_,i)=>i!==idx); setEditingItems({...editingItems,items:n})}} className="text-gray-400 hover:text-red-500 p-1 mt-1 shrink-0"><i className="fas fa-trash-alt"></i></button>
                                                                            </div>
                                                                        ))}
                                                                        <button onClick={() => setEditingItems({...editingItems, items: [...editingItems.items, {model:'', vendorModel:'', quantity:1, unitPrice:'', unitPriceUsd:'', remark:''}]})} className="text-xs text-blue-600 font-bold bg-blue-100 px-2 py-1 rounded hover:bg-blue-200 mt-2"><i className="fas fa-plus mr-1"></i>新增一列</button>
                                                                    </div>
                                                                ) : (
                                                                    <ul className="space-y-2">
                                                                        {order.items?.map((item, idx) => (
                                                                            <li key={idx} className="flex bg-white p-2 border rounded shadow-sm items-center gap-2">
                                                                                <span className="font-semibold w-1/4 truncate text-sm" title={item.model}>{item.model}</span>
                                                                                <span className="text-gray-600 w-1/4 truncate text-sm" title={item.vendorModel}>{item.vendorModel || '-'}</span>
                                                                                <span className="w-16 text-center bg-gray-100 rounded text-sm py-0.5 font-bold text-gray-700">x {item.quantity}</span>
                                                                                {isAdmin && (
                                                                                    <div className="flex flex-col text-right w-24 border-l pl-2 leading-tight">
                                                                                        <span className="text-blue-700 text-xs font-bold">{formatRMB(item.unitPrice || 0)}</span>
                                                                                        {item.unitPriceUsd && <span className="text-gray-500 text-[10px]">{formatUSD(item.unitPriceUsd)}</span>}
                                                                                    </div>
                                                                                )}
                                                                                <span className="flex-1 text-gray-500 ml-2 truncate text-sm" title={item.remark}>{item.remark || '-'}</span>
                                                                                
                                                                                {isAdmin && (
                                                                                    <button onClick={() => handleDeleteItem(order, idx)} className="text-gray-400 hover:text-red-500 ml-2 p-1 transition-colors" title="刪除此明細">
                                                                                        <i className="fas fa-trash-alt"></i>
                                                                                    </button>
                                                                                )}
                                                                            </li>
                                                                        ))}
                                                                    </ul>
                                                                )}
                                                            </div>
                                                            
                                                            <div className="w-full md:w-64 space-y-4">
                                                                {isAdmin && (
                                                                    <div className="bg-blue-50 p-4 border border-blue-200 rounded-lg text-center shadow-sm">
                                                                        <p className="text-xs text-blue-800 font-bold mb-1"><i className="fas fa-lock mr-1"></i>訂單總金額 (內部)</p>
                                                                        <p className="text-2xl font-black text-blue-900">{formatRMB(order.amount)}</p>
                                                                    </div>
                                                                )}
                                                            </div>
                                                        </div>

                                                        {order.status !== '已收貨' ? (
                                                            <div className="m-4 p-3 bg-white border border-blue-100 rounded-lg shadow-sm">
                                                                <h4 className="text-sm font-bold mb-2 text-gray-800"><i className="fas fa-check-circle text-green-500 mr-1"></i>標記為已完成 (收貨)</h4>
                                                                {isAdmin ? (
                                                                    <div className="flex gap-3 items-center">
                                                                        <input type="date" value={completeData.date} onChange={e=>setCompleteData({...completeData, date:e.target.value})} className="border rounded px-2 py-1.5 text-sm outline-none focus:ring-1 focus:ring-green-500"/>
                                                                        <input type="text" placeholder="輸入結案備註..." value={completeData.remark} onChange={e=>setCompleteData({...completeData, remark:e.target.value})} className="border rounded px-2 py-1.5 text-sm flex-1 outline-none focus:ring-1 focus:ring-green-500"/>
                                                                        <button onClick={() => handleCompleteOrder(order.dbId)} className="bg-green-600 hover:bg-green-700 text-white px-5 py-1.5 rounded text-sm font-bold shadow-sm">確認完成</button>
                                                                    </div>
                                                                ) : <div className="text-sm text-red-600 bg-red-50 p-2.5 rounded border border-red-100 font-medium"><i className="fas fa-lock mr-2"></i>僅限授權帳號 (Ryan) 執行結案收貨。</div>}
                                                            </div>
                                                        ) : (
                                                            <div className="m-4 p-3 bg-gray-100 rounded-lg text-xs text-gray-600 border border-gray-200">
                                                                <i className="fas fa-check-circle text-gray-400 mr-1"></i>此訂單已於 <strong>{order.completionData?.date}</strong> 結案。 {order.completionData?.remark && <span>(備註：{order.completionData.remark})</span>}
                                                            </div>
                                                        )}
                                                    </td>
                                                </tr>
                                            )}
                                        </React.Fragment>
                                    );
                                })}
                                {processedOrders.length === 0 && (
                                    <tr><td colSpan="7" className="p-8 text-center text-gray-400">目前沒有符合的採購單紀錄</td></tr>
                                )}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
