<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>採購單管理系統</title>
    <link rel="shortcut icon" href="k-192.png" type="image/png">
    <link rel="apple-touch-icon" href="k-192.png">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const firebaseConfig = {
            apiKey: "AIzaSyB9VcueWD3AdLENr5Jdp0__pRVCYtJ95no",
            authDomain: "pms-kingtex.firebaseapp.com",
            projectId: "pms-kingtex",
            storageBucket: "pms-kingtex.firebasestorage.app",
            messagingSenderId: "950519740298",
            appId: "1:950519740298:web:19e78a0fb18f6788083a73",
            measurementId: "G-Y9DL3C4X2E"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        function App() {
            // 所有狀態宣告
            const [orders, setOrders] = useState([]);
            const [prices, setPrices] = useState([]);
            const [vendors, setVendors] = useState([]);
            const [isLoading, setIsLoading] = useState(true);
            const [currentView, setCurrentView] = useState('PO_LIST');
            const [expandedOrderId, setExpandedOrderId] = useState(null);
            
            // 這裡載入所有 Firebase 資料監聽
            useEffect(() => {
                auth.signInAnonymously();
                const unsubOrders = db.collection('po_orders').onSnapshot(s => setOrders(s.docs.map(d => ({ dbId: d.id, ...d.data() }))));
                const unsubPrices = db.collection('po_prices').onSnapshot(s => setPrices(s.docs.map(d => ({id: d.id, ...d.data()}))));
                const unsubVendors = db.collection('po_vendors').onSnapshot(s => setVendors(s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => a.name.localeCompare(b.name))));
                setIsLoading(false);
                return () => { unsubOrders(); unsubPrices(); unsubVendors(); };
            }, []);

            if (isLoading) return <div className="text-center p-10">讀取中...</div>;

            return (
                <div className="max-w-6xl mx-auto p-4">
                    {/* 這裡依據 currentView 切換頁面內容 */}
                    {currentView === 'PO_LIST' && (
                        <div className="overflow-x-auto">
                            <table className="w-full text-left min-w-[600px]">
                                {/* 你的訂單列表 Table */}
                            </table>
                        </div>
                    )}
                    {currentView === 'VENDOR_MANAGEMENT' && <div>廠商管理頁面內容</div>}
                    {currentView === 'PRICE_MANAGEMENT' && <div>單價管理頁面內容</div>}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
